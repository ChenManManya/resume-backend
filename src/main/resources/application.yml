server:
  port: 8080
  servlet:
    context-path: /api
spring:
  profiles:
    active: dev
app:
  upload:
    base-dir: uploads
    public-path: /uploads
    avatar-dir: avatars
    max-avatar-size-bytes: 2097152
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: cn.chenmanman.resume.controller
sa-token:
  # jwt秘钥
  jwt-secret-key: Huanyuan2.@2026#SecureKey!
  token-name: Authorization     # 更推荐用 Authorization（符合规范）
  token-prefix: Bearer          # 标准 JWT 前缀
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 3600
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: false
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true


